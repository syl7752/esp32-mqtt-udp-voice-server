spring:
  application:
    name: udp-server
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

udp:
  port: ${UDP_PORT:8888}
  worker-threads: ${UDP_WORKER_THREADS:1}

audio:
  sample-rate: ${AUDIO_SAMPLE_RATE:24000}
  frame-duration-ms: ${AUDIO_FRAME_DURATION_MS:60}
  opus-bitrate: ${AUDIO_OPUS_BITRATE:48000}
  prefill-frames: ${AUDIO_PREFILL_FRAMES:5}

vad:
  model-path: ${SILERO_VAD_MODEL:models/silero_vad.onnx}
  threshold: ${VAD_THRESHOLD:0.5}
  silence-ms: ${VAD_SILENCE_MS:700}
  max-utterance-seconds: ${VAD_MAX_UTTERANCE_SECONDS:20}

funasr:
  transcription-url: ${FUNASR_TRANSCRIPTION_URL:http://127.0.0.1:8000/v1/audio/transcriptions}
  model: ${FUNASR_MODEL:fun-asr-nano}
  language: ${FUNASR_LANGUAGE:zh}

openai:
  api-key: ${OPENAI_API_KEY:}
  api-mode: ${OPENAI_API_MODE:responses}
  url: ${OPENAI_API_URL:https://api.openai.com/v1/responses}
  model: ${OPENAI_MODEL:gpt-5.6}
  thinking: ${OPENAI_THINKING:}
  instructions: ${OPENAI_INSTRUCTIONS:你是一个简洁、友好的语音助手。请用适合朗读的短句回答。}

index-tts:
  api-mode: ${INDEX_TTS_API_MODE:openai}
  speech-url: ${INDEX_TTS_SPEECH_URL:http://127.0.0.1:6006/audio/speech}
  model: ${INDEX_TTS_MODEL:index-tts}
  voice: ${INDEX_TTS_VOICE:your-speaker-name}
  audio-paths: ${INDEX_TTS_AUDIO_PATHS:}

logging:
  level:
    io.github.esp32voice: INFO
